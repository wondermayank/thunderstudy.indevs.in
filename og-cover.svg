<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#0C2340"/>
      <stop offset="100%" stop-color="#0B1A38"/>
    </linearGradient>
    <!-- Blue radial accent -->
    <radialGradient id="ogGlow1" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogGlow2" cx="90%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold bolt -->
    <linearGradient id="ogGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5B8"/>
      <stop offset="40%" stop-color="#FFD54A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Logo card -->
    <linearGradient id="ogCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Logo inner blue -->
    <linearGradient id="ogBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="ogLogoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="ogShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2563EB" flood-opacity="0.5"/>
    </filter>
    <filter id="ogBoltGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ogTextGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ogClip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <g clip-path="url(#ogClip)">
    <!-- Dark background -->
    <rect width="1200" height="630" fill="url(#ogBg)"/>

    <!-- Blue glows -->
    <rect width="1200" height="630" fill="url(#ogGlow1)"/>
    <rect width="1200" height="630" fill="url(#ogGlow2)"/>

    <!-- Decorative grid lines -->
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>

    <!-- Decorative dashed circle behind logo -->
    <circle cx="200" cy="315" r="220" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="8 14" stroke-opacity="0.2"/>
    <circle cx="200" cy="315" r="170" fill="none" stroke="#38BDF8" stroke-width="1" stroke-dasharray="4 10" stroke-opacity="0.15"/>

    <!-- Decorative dots top-right -->
    <circle cx="1050" cy="80" r="6" fill="#38BDF8" opacity="0.4"/>
    <circle cx="1100" cy="120" r="4" fill="#38BDF8" opacity="0.25"/>
    <circle cx="1140" cy="70" r="3" fill="#38BDF8" opacity="0.2"/>
    <circle cx="1000" cy="55" r="5" fill="#FFD54A" opacity="0.3"/>

    <!-- Decorative dots bottom-left -->
    <circle cx="80" cy="560" r="5" fill="#38BDF8" opacity="0.3"/>
    <circle cx="140" cy="590" r="3.5" fill="#FFD54A" opacity="0.25"/>

    <!-- ===== LOGO MARK (left side) ===== -->
    <!-- Glow -->
    <circle cx="200" cy="315" r="120" fill="url(#ogLogoGlow)"/>
    <!-- Card -->
    <rect x="72" y="187" width="256" height="256" rx="64" fill="url(#ogCard)" filter="url(#ogShadow)"/>
    <rect x="72" y="187" width="256" height="256" rx="64" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- Corner arcs -->
    <path d="M100 247 A68 68 0 0 1 162 207" fill="none" stroke="url(#ogBlue)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M300 383 A68 68 0 0 1 238 423" fill="none" stroke="url(#ogBlue)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <!-- Orbit -->
    <circle cx="200" cy="315" r="82" fill="none" stroke="#7DD3FC" stroke-width="1.5" stroke-dasharray="5 8" stroke-opacity="0.4"/>
    <!-- Core -->
    <circle cx="200" cy="315" r="65" fill="#FFFFFF" fill-opacity="0.07"/>
    <circle cx="200" cy="315" r="56" fill="none" stroke="#BAE6FD" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Bolt -->
    <path d="M218 198 L152 305 H188 L172 400 L248 290 H212 L218 198Z"
      fill="url(#ogGold)" stroke="#FFF4B5" stroke-width="2" stroke-linejoin="round" filter="url(#ogBoltGlow)"/>
    <path d="M213 215 L165 302 H194 L181 375 L240 284 H211 L213 215Z"
      fill="#FFFFFF" opacity="0.3"/>

    <!-- ===== TEXT (right side) ===== -->
    <!-- Brand name -->
    <text x="390" y="290"
      font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
      font-size="88"
      font-weight="800"
      letter-spacing="-2"
      fill="#FFFFFF"
      filter="url(#ogTextGlow)">Thunder</text>
    <text x="390" y="380"
      font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
      font-size="88"
      font-weight="800"
      letter-spacing="-2"
      fill="#FFD54A"
      filter="url(#ogTextGlow)">Study</text>

    <!-- Divider line -->
    <rect x="390" y="408" width="560" height="3" rx="2" fill="url(#ogBlue)" opacity="0.6"/>

    <!-- Tagline -->
    <text x="390" y="452"
      font-family="'Segoe UI', 'SF Pro', 'Helvetica Neue', Arial, sans-serif"
      font-size="26"
      font-weight="400"
      letter-spacing="0.3"
      fill="#BAE6FD"
      opacity="0.9">Free CBSE Class 12 Notes · CUET Mock Tests 2026</text>

    <!-- Pill badges -->
    <rect x="390" y="480" width="130" height="34" rx="17" fill="#2563EB" fill-opacity="0.7"/>
    <text x="455" y="502" text-anchor="middle"
      font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600"
      fill="#FFFFFF">No Login</text>

    <rect x="534" y="480" width="142" height="34" rx="17" fill="#0EA5E9" fill-opacity="0.7"/>
    <text x="605" y="502" text-anchor="middle"
      font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600"
      fill="#FFFFFF">Always Free</text>

    <rect x="690" y="480" width="168" height="34" rx="17" fill="#F59E0B" fill-opacity="0.75"/>
    <text x="774" y="502" text-anchor="middle"
      font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600"
      fill="#0F172A">thunderstudy.indevs.in</text>

    <!-- Bottom strip -->
    <rect x="0" y="610" width="1200" height="20" fill="url(#ogBlue)" opacity="0.5"/>
  </g>
</svg>
