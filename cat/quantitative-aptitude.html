<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT Quantitative Aptitude - ThunderStudy</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple-600: #60A5FA;
            --purple-400: #93C5FD;
            --purple-200: #DBEAFE;
            --blue-400: #3B82F6;
            --blue-100: #E0E7FF;
            --white: #FFFFFF;
            --bg-light: #F0F9FF;
            --glass-blur: 20px;
            --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            color: #1F2937;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(var(--glass-blur));
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main Container */
        .container {
            width: 100%;
            min-height: calc(100vh - 120px);
            margin-top: 70px;
            margin-bottom: 50px;
            display: flex;
            position: relative;
            overflow: visible;
        }

        /* Screen Panels */
        .screen {
            width: 100%;
            min-height: auto;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
            top: 0;
            left: 0;
        }

        .screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Topics Screen */
        #topics-screen {
            z-index: 1;
        }

        .screen-title {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 60px;
            text-align: center;
            color: #3B82F6;
            letter-spacing: -1px;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        .topic-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 24px;
            padding: 40px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 180px;
            box-shadow: 0 8px 32px rgba(96, 165, 250, 0.08);
        }

        .topic-card:hover {
            background: rgba(255, 255, 255, 0.95);
            border-color: #93C5FD;
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(96, 165, 250, 0.15);
        }

        .topic-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #3B82F6;
            margin-bottom: 10px;
        }

        .topic-card p {
            font-size: 13px;
            color: #6B7280;
            line-height: 1.6;
        }

        .topic-icon {
            width: 50px;
            height: 50px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #93C5FD 0%, #60A5FA 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topic-icon svg {
            width: 28px;
            height: 28px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        /* Chapters Screen */
        #chapters-screen {
            z-index: 2;
        }

        .chapters-header {
            display: flex;
            align-items: center;
            margin-bottom: 50px;
            width: 100%;
            max-width: 900px;
        }

        .back-button {
            background: linear-gradient(135deg, #93C5FD 0%, #60A5FA 100%);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            margin-right: 20px;
            flex-shrink: 0;
        }

        .back-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(96, 165, 250, 0.2);
        }

        .back-button svg {
            width: 24px;
            height: 24px;
            stroke: white;
            stroke-width: 2.5;
        }

        .chapter-title {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: #3B82F6;
        }

        .chapters-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            width: 100%;
            max-width: 900px;
        }

        .chapter-item {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            box-shadow: 0 8px 32px rgba(96, 165, 250, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            user-select: none;
        }

        .chapter-item:hover {
            background: rgba(255, 255, 255, 0.95);
            border-color: #60A5FA;
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(96, 165, 250, 0.12);
        }

        .chapter-item:active {
            transform: translateY(-3px);
        }

        .chapter-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #DBEAFE 0%, #E0E7FF 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chapter-icon svg {
            width: 22px;
            height: 22px;
            stroke: #3B82F6;
            stroke-width: 2;
            fill: none;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(var(--glass-blur));
            background: rgba(255, 255, 255, 0.7);
            border-top: 1px solid rgba(96, 165, 250, 0.2);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #3B82F6;
            font-weight: 600;
        }

        footer span {
            opacity: 0.8;
        }

        /* Statistics Section */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(96, 165, 250, 0.08);
        }

        .stat-number {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 13px;
            color: #6B7280;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 0 20px;
            }

            .logo {
                font-size: 18px;
            }

            .screen {
                padding: 60px 20px 70px 20px;
            }

            .screen-title {
                font-size: 28px;
                margin-bottom: 40px;
            }

            .stats-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                max-width: 100%;
                margin-bottom: 30px;
            }

            .stat-card {
                padding: 12px 8px;
            }

            .stat-number {
                font-size: 24px;
                margin-bottom: 4px;
            }

            .stat-label {
                font-size: 11px;
            }

            .topics-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .topic-card {
                padding: 30px;
                min-height: 150px;
            }

            .topic-card:hover {
                background: rgba(255, 255, 255, 0.8);
                border-color: rgba(167, 139, 250, 0.2);
                transform: none;
                box-shadow: 0 8px 32px rgba(124, 58, 237, 0.08);
            }

            .stats-container {
                grid-template-columns: 1fr;
                margin-top: 40px;
            }

            .chapters-header {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 40px;
            }

            .back-button {
                margin-right: 0;
                margin-bottom: 20px;
            }

            .chapter-title {
                font-size: 24px;
            }

            .chapters-list {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .screen-title {
                font-size: 22px;
                margin-bottom: 30px;
            }

            .stats-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                margin-bottom: 20px;
            }

            .stat-card {
                padding: 10px 5px;
            }

            .stat-number {
                font-size: 20px;
                margin-bottom: 2px;
            }

            .stat-label {
                font-size: 10px;
            }

            .topic-card {
                padding: 24px;
                min-height: 140px;
            }

            .topic-card h3 {
                font-size: 18px;
            }

            .chapter-title {
                font-size: 20px;
            }

            .chapters-list {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .chapter-item {
                padding: 20px;
            }

            .chapter-item a {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">⚡ ThunderStudy</div>
    </header>

    <div class="container">
        <!-- Topics Screen -->
        <div class="screen" id="topics-screen">
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-number">54</div>
                    <div class="stat-label">Files</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">3</div>
                    <div class="stat-label">Topics</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">54</div>
                    <div class="stat-label">Chapters</div>
                </div>
            </div>
            <h1 class="screen-title">CAT Quantitative Aptitude</h1>
            <div class="topics-grid">
                <div class="topic-card" onclick="showChapters('notes')">
                    <div class="topic-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2L3 7v10c0 8 9 11 9 11s9-3 9-11V7l-9-5z"/>
                            <path d="M8 12l3 3 5-5"/>
                        </svg>
                    </div>
                    <h3>Notes</h3>
                    <p>Complete study material for all concepts</p>
                </div>
                <div class="topic-card" onclick="showChapters('formulas')">
                    <div class="topic-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M3 7h18"/>
                            <path d="M5 5v14c0 1 .5 2 1.5 2h11c1 0 1.5-1 1.5-2V5"/>
                            <path d="M9 5V3h6v2M10 10h4M10 15h4"/>
                        </svg>
                    </div>
                    <h3>Important Formulas</h3>
                    <p>Essential formulas and conversions</p>
                </div>
                <div class="topic-card" onclick="showChapters('tricks')">
                    <div class="topic-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2L2 7v5c0 8 10 10 10 10s10-2 10-10V7l-10-5z"/>
                            <path d="M12 11v5M9 14h6"/>
                        </svg>
                    </div>
                    <h3>Shortcuts & Tricks</h3>
                    <p>Quick solving techniques</p>
                </div>
            </div>
        </div>

        <!-- Chapters Screen -->
        <div class="screen hidden" id="chapters-screen">
            <div class="chapters-header">
                <button class="back-button" onclick="backToTopics()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h2 class="chapter-title" id="chapter-title"></h2>
            </div>
            <div class="chapters-list" id="chapters-list"></div>
        </div>
    </div>

    <footer>
        <span>Made with 💜 by <strong>Wondermayank</strong></span>
    </footer>

    <script>
        const topicsData = {
            notes: {
                title: 'Notes',
                chapters: [
                    'Number System',
                    'Progressions And Series',
                    'Averages',
                    'Alligations And Mixtures',
                    'Percentages',
                    'Profit, Loss And Discounts',
                    'Simple And Compound Interest',
                    'Ratio, Proportion And Variation',
                    'Time And Work',
                    'Time Speed And Distances',
                    'Geometry And Mensuration',
                    'Coordinate Geometry',
                    'Functions',
                    'Inequalities',
                    'Quadratic And Other Equation',
                    'Logarithms',
                    'Quiz',
                    'Permutation And Combination',
                    'Probability',
                    'Set Theory'
                ]
            },
            formulas: {
                title: 'Important Formulas',
                chapters: [
                    'Calculation Tricks',
                    'Conversions of Units',
                    'Number System',
                    'Average',
                    'Basic Algebra',
                    'Percentage & Profit & Loss',
                    'Ratio Mixture & Partnership',
                    'Time And Work',
                    'Time Speed & Distance',
                    'Geometry & Mensuration',
                    'Co-ordinate Geometry',
                    'Set Theory',
                    'Logarithms',
                    'Permutation & Combination',
                    'Probability',
                    'Clock & Calendars',
                    'Mean & Basic Statistics',
                    'Trigonometry'
                ]
            },
            tricks: {
                title: 'Shortcuts & Tricks',
                chapters: [
                    'Geometry Mensuration',
                    'Time Speed Distance And Work',
                    'Number System',
                    'Ratios & Proportions',
                    'Logarithm Surds And indices',
                    'Permutation & Combination',
                    'Simple & Compound Interest',
                    'Profit & Loss',
                    'Remainder Theorem',
                    'Bayes Theorem of Conditional Probability',
                    'Set Theory And Venn Diagrams',
                    'Mixtures And Alligations',
                    'Progression And Series',
                    'Inequalities',
                    'Quadratic Equation',
                    'Linear Equations'
                ]
            }
        };

        function showChapters(topic) {
            const data = topicsData[topic];
            const topicsScreen = document.getElementById('topics-screen');
            const chaptersScreen = document.getElementById('chapters-screen');
            const chapterTitle = document.getElementById('chapter-title');
            const chaptersList = document.getElementById('chapters-list');

            chapterTitle.textContent = data.title;
            chaptersList.innerHTML = '';

            data.chapters.forEach((chapter, index) => {
                const chapterNum = index + 1;
                const fileName = `qa${chapterNum}.pdf`;
                const url = `https://thunderstudy.github.io/cat/qa/${topic}/${fileName}`;

                const chapterElement = document.createElement('div');
                chapterElement.className = 'chapter-item';
                
                // Make the entire element clickable
                chapterElement.style.cursor = 'pointer';
                chapterElement.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    window.open(url, '_blank', 'noopener,noreferrer');
                });
                
                const iconDiv = document.createElement('div');
                iconDiv.className = 'chapter-icon';
                iconDiv.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                        <path d="M13 2v7h7"/>
                        <path d="M8 14h8M8 18h8"/>
                    </svg>
                `;
                
                const textElement = document.createElement('span');
                textElement.textContent = chapter;
                textElement.style.fontWeight = '600';
                textElement.style.fontSize = '15px';
                textElement.style.color = '#3B82F6';
                textElement.style.display = 'block';
                textElement.style.padding = '8px';
                
                chapterElement.appendChild(iconDiv);
                chapterElement.appendChild(textElement);
                chaptersList.appendChild(chapterElement);
            });

            topicsScreen.classList.add('hidden');
            chaptersScreen.classList.remove('hidden');

            window.currentTopic = topic;
        }

        function backToTopics() {
            const topicsScreen = document.getElementById('topics-screen');
            const chaptersScreen = document.getElementById('chapters-screen');

            chaptersScreen.classList.add('hidden');
            topicsScreen.classList.remove('hidden');
        }

        // Calculate and update statistics on page load
        document.addEventListener('DOMContentLoaded', function() {
            let totalChapters = 0;
            let totalFiles = 0;
            
            for (let topic in topicsData) {
                const chapterCount = topicsData[topic].chapters.length;
                totalChapters += chapterCount;
                totalFiles += chapterCount; // Each chapter = 1 PDF file
            }

            const statNumbers = document.querySelectorAll('.stat-number');
            if (statNumbers.length >= 3) {
                statNumbers[0].textContent = totalFiles;
                statNumbers[1].textContent = Object.keys(topicsData).length;
                statNumbers[2].textContent = totalChapters;
            }
        });
    </script>
</body>
</html>
